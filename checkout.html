<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Tech & Game Hub</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="site-header">
        <div>
            <h1>Tech & Game Hub</h1>
        </div>
        <button id="mobile-menu-toggle" class="mobile-menu-toggle">☰</button>
        <nav class="main-nav">
            <ul id="main-nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="store.html">Store</a></li>
                <li><a href="articles.html">Articles</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2>Checkout</h2>
        <form action="#" method="post">
            <fieldset>
                <legend>Contact Information</legend>
                <div>
                    <label for="fullName">Full Name:</label>
                    <input type="text" id="fullName" name="fullName" placeholder="Full Name" required>
                </div>
                <div>
                    <label for="email">Email Address:</label>
                    <input type="email" id="email" name="email" placeholder="Email Address" required>
                </div>
            </fieldset>

            <fieldset>
                <legend>Billing Address</legend>
                <div>
                    <label for="billingAddress">Address:</label>
                    <textarea id="billingAddress" name="billingAddress" placeholder="Billing Address" required></textarea>
                </div>
            </fieldset>

            <fieldset>
                <legend>Payment Details</legend>
                <div>
                    <label for="cardName">Name on Card:</label>
                    <input type="text" id="cardName" name="cardName" placeholder="Name on Card" required>
                </div>
                <div>
                    <label for="cardNumber">Card Number:</label>
                    <input type="text" id="cardNumber" name="cardNumber" placeholder="XXXX-XXXX-XXXX-XXXX" required disabled>
                </div>
                <div>
                    <label for="expiryDate">Expiry Date:</label>
                    <input type="text" id="expiryDate" name="expiryDate" placeholder="MM/YY" required disabled>
                </div>
                <div>
                    <label for="cvv">CVV:</label>
                    <input type="text" id="cvv" name="cvv" placeholder="XXX" required disabled>
                </div>
                <p><em>Payment gateway integration would appear here. For now, fields are disabled.</em></p>
            </fieldset>

            <button type="submit">Complete Purchase</button>
        </form>
    </main>

    <footer class="site-footer">
        <p>&copy; 2023 Tech & Game Hub</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
