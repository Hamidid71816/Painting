<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store - Tech & Game Hub</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="site-header">
        <div>
            <h1>Tech & Game Hub</h1>
        </div>
        <button id="mobile-menu-toggle" class="mobile-menu-toggle">☰</button>
        <nav class="main-nav">
            <ul id="main-nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="store.html">Store</a></li>
                <li><a href="articles.html">Articles</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2>Our Digital Products</h2>
        <div class="search-bar">
            <input type="search" id="productSearch" placeholder="Search products...">
            <button>Search</button>
        </div>
        <div class="product-grid">
            <div class="product-item">
                <img src="images/product_placeholder.png" alt="Product 1">
                <h3>Product Alpha</h3>
                <p class="price">$19.99</p>
                <button onclick="window.location.href='product-detail.html'">View Details</button>
            </div>
            <div class="product-item">
                <img src="images/product_placeholder.png" alt="Product 2">
                <h3>Product Beta</h3>
                <p class="price">$29.99</p>
                <button onclick="window.location.href='product-detail.html'">View Details</button>
            </div>
            <div class="product-item">
                <img src="images/product_placeholder.png" alt="Product 3">
                <h3>Product Gamma</h3>
                <p class="price">$39.99</p>
                <button onclick="window.location.href='product-detail.html'">View Details</button>
            </div>
            <div class="product-item">
                <img src="images/product_placeholder.png" alt="Product 4">
                <h3>Gift Card</h3>
                <p class="price">$10.00</p>
                <button onclick="window.location.href='product-detail.html'">View Details</button>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <p>&copy; 2023 Tech & Game Hub</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
